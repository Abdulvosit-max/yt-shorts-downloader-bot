services:
  - type: web
    name: yt-downloader-bot
    env: python
    buildCommand: ./render-build.sh
    startCommand: export PATH=$PATH:$HOME/ffmpeg && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
